version: '3.8'

services:
  hyperfy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: hyperfy
    restart: unless-stopped
    ports:
      - "$PORT:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_CODE=${ADMIN_CODE:-admin}
      - JWT_SECRET=${JWT_SECRET:-hyper}
      - PORT=${PORT:-3000}
      - SAVE_INTERVAL=${SAVE_INTERVAL:-60}
      - WORLD=${WORLD:-world}
      - PUBLIC_MAX_UPLOAD_SIZE=${PUBLIC_MAX_UPLOAD_SIZE:-32}
      - PUBLIC_WS_URL=${PUBLIC_WS_URL:-${SERVICE_FQDN_HYPERFY}/ws}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-${SERVICE_FQDN_HYPERFY}/api}
      - PUBLIC_ASSETS_URL=${PUBLIC_ASSETS_URL:-${SERVICE_FQDN_HYPERFY}/assets}
    volumes:
      - type: bind
        source: /nvme/hyperfy/${WORLD}
        target: /app/${WORLD}
        is_directory: true
      - type: bind
        source: .env
        target: /app/.env
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - coolify.managed=true
      - coolify.applicationId=5
      - coolify.type=application